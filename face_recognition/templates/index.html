<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人脸识别 - Immich</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f; color: #e0e0e0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { margin: 40px 0 10px; font-size: 28px; color: #fff; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .upload-area {
            width: 500px; max-width: 90vw; border: 2px dashed #444; border-radius: 16px;
            padding: 50px 20px; text-align: center; cursor: pointer;
            transition: border-color .3s, background .3s;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #4fc3f7; background: rgba(79,195,247,0.06);
        }
        .upload-area svg { width: 48px; height: 48px; fill: #666; margin-bottom: 12px; }
        .upload-area p { color: #999; font-size: 14px; }
        .upload-area .hint { font-size: 12px; color: #666; margin-top: 6px; }
        #fileInput { display: none; }
        .preview {
            width: 500px; max-width: 90vw; margin-top: 20px; display: none;
            position: relative; border-radius: 12px; overflow: visible;
        }
        .preview img { width: 100%; display: block; border-radius: 12px; }
        .face-box {
            position: absolute; border: 2px solid #4fc3f7; border-radius: 4px;
            background: rgba(79,195,247,0.12); cursor: pointer;
            transition: background .2s;
        }
        .face-box:hover { background: rgba(79,195,247,0.25); }
        .face-label {
            position: absolute; top: -24px; left: -2px; background: #4fc3f7;
            color: #000; font-size: 12px; font-weight: 600; padding: 2px 8px;
            border-radius: 4px 4px 0 0; white-space: nowrap;
        }
        .btn {
            margin-top: 16px; padding: 12px 40px; background: #4fc3f7; color: #000;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
            cursor: pointer; display: none; transition: background .2s;
        }
        .btn:hover { background: #29b6f6; }
        .btn:disabled { background: #555; color: #999; cursor: not-allowed; }
        .result {
            width: 500px; max-width: 90vw; margin-top: 24px; display: none;
        }
        .result h3 { color: #4fc3f7; margin-bottom: 12px; }
        .face-card {
            background: #1a1a1a; border: 1px solid #333; border-radius: 10px;
            padding: 16px; margin-bottom: 12px;
        }
        .face-card .name {
            font-size: 18px; font-weight: 600; color: #4fc3f7;
        }
        .face-card .name.unknown { color: #ff9800; }
        .face-card .meta { color: #888; font-size: 13px; margin-top: 6px; }
        .loading {
            display: none; margin-top: 20px; text-align: center;
        }
        .loading .spinner {
            width: 36px; height: 36px; border: 3px solid #333;
            border-top-color: #4fc3f7; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h1>人脸识别</h1>
    <p class="subtitle">ML 直接提取特征 → pgvector 匹配人脸信息</p>

    <div class="upload-area" id="uploadArea">
        <svg viewBox="0 0 24 24"><path d="M19 7v2.99s-1.99.01-2 0V7h-3s.01-1.99 0-2h3V2h2v3h3v2h-3zm-3 4V8h-3V5H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8h-3zM5 19l3-4 2 3 3-4 4 5H5z"/></svg>
        <p>点击或拖拽上传图片</p>
        <p class="hint">支持 JPG / PNG 格式</p>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div class="preview" id="preview">
        <img id="previewImg" src="">
    </div>

    <button class="btn" id="recognizeBtn">开始识别</button>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>正在识别中，请稍候...</p>
    </div>

    <div class="result" id="result">
        <h3>识别结果</h3>
        <div id="faceList"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('previewImg');
        const recognizeBtn = document.getElementById('recognizeBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const faceList = document.getElementById('faceList');

        let selectedFile = null;

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', e => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) handleFile(fileInput.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) { alert('请上传图片文件'); return; }
            selectedFile = file;
            previewImg.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            recognizeBtn.style.display = 'inline-block';
            result.style.display = 'none';
            // 清除旧的人脸框
            preview.querySelectorAll('.face-box').forEach(el => el.remove());
        }

        recognizeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            recognizeBtn.disabled = true;
            loading.style.display = 'block';
            result.style.display = 'none';

            const formData = new FormData();
            formData.append('image', selectedFile);

            try {
                const resp = await fetch('/api/recognize', { method: 'POST', body: formData });
                const data = await resp.json();

                if (!resp.ok) {
                    alert(data.error || '识别失败');
                    return;
                }

                faceList.innerHTML = '';
                loading.style.display = 'none';
                result.style.display = 'block';

                if (data.totalFaces === 0) {
                    faceList.innerHTML = '<p style="color:#888">未检测到人脸</p>';
                    return;
                }

                // 绘制人脸框
                const img = previewImg;
                const displayW = img.clientWidth;
                const displayH = img.clientHeight;

                data.faces.forEach((face, i) => {
                    // 人脸框（使用 boundingBox X1/Y1/X2/Y2 + imageWidth/Height 缩放）
                    if (face.boundingBoxX2 > face.boundingBoxX1 && face.boundingBoxY2 > face.boundingBoxY1) {
                        const scaleX = displayW / face.imageWidth;
                        const scaleY = displayH / face.imageHeight;
                        const x = face.boundingBoxX1 * scaleX;
                        const y = face.boundingBoxY1 * scaleY;
                        const w = (face.boundingBoxX2 - face.boundingBoxX1) * scaleX;
                        const h = (face.boundingBoxY2 - face.boundingBoxY1) * scaleY;
                        const box = document.createElement('div');
                        box.className = 'face-box';
                        box.style.left = x + 'px';
                        box.style.top = y + 'px';
                        box.style.width = w + 'px';
                        box.style.height = h + 'px';

                        const label = document.createElement('span');
                        label.className = 'face-label';
                        label.textContent = face.personName || `未知 #${i + 1}`;
                        box.appendChild(label);
                        preview.appendChild(box);
                    }

                    // 结果卡片
                    const card = document.createElement('div');
                    card.className = 'face-card';
                    const personName = face.personName || '';
                    const nameClass = personName ? 'name' : 'name unknown';
                    const nameText = personName || '未识别';
                    card.innerHTML = `
                        <div class="${nameClass}">${nameText}</div>
                        <div class="meta">
                            距离: ${face.distance != null ? `${face.distance.toFixed(4)}` : ''}<br>
                            ${face.personId ? '人物ID: ' + face.personId + '<br>' : ''}
                            坐标: (${face.boundingBoxX1}, ${face.boundingBoxY1}) - (${face.boundingBoxX2}, ${face.boundingBoxY2})<br>
                            图片尺寸: ${face.imageWidth}x${face.imageHeight}
                        </div>
                    `;
                    faceList.appendChild(card);
                });
            } catch (err) {
                alert('请求失败: ' + err.message);
            } finally {
                recognizeBtn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
